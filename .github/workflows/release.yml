name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -T v143

      - name: Build Project
        run: cmake --build build --config Release

      - name: Archive Release
        run: Compress-Archive -Path build/Release/* -DestinationPath MultiMonitorTools-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MultiMonitorTools-*.zip
          name: MultiMonitorTools-${{ github.ref_name }}
          body: "Automated build for version ${{ github.ref_name }}"
          draft: true